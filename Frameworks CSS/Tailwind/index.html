<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind - CSS</title>
</head>
<body>
    <header>
        <section id="header-menu">
            <div class="menu-btns">
                <li class="header-btns">
                    <ul id="home">Home</ul>
                    <ul id="sobre">Sobre</ul>
                    <ul id="produtos">Produtos</ul>
                    <ul id="contato">Contato</ul>
                    <ul id="login">LOGIN</ul>
                </li>
            </div>
            <div class="header-logo">
                <img src="images/logo-tacos.png" alt="Logo Taco">
            </div>
        </section>
    </header>
    <main>
        <section id="hero-content">
            <h3 id="h3-hero-title">Traditional Mexican</h3>
            <h2 id="h2-hero-title">Taco Restaurant</h2>
            <hr id="horizontal-line">
            <a id="hero-view-more" href="#">View More</a>
        </section>
        <section id="taco-history">
            <div class="history-photo">
                <img src="images/sobre.jpg"
            </div>
            <div class="history-tacos">
                <div class="we-have-exp">
                    <h2 class="h2-title-size">We Have Experience</h2>
                </div>
                <div class="years-history">
                    <h2 class="h2-title-size">28 Years of History</h2>
                </div>
                <div class="taco-chefs">
                    <h2 class="h2-title-size">Expert Taco Chefs</h2>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
